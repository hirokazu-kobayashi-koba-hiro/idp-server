# Dependabot: 依存ライブラリの自動更新 + セキュリティアラート
# https://docs.github.com/en/code-security/dependabot
version: 2
updates:
  # E2E テスト (npm)
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "03:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    rebase-strategy: disabled
    labels:
      - "dependencies"
    groups:
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    rebase-strategy: disabled
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
