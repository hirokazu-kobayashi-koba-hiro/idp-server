apiVersion: v1
kind: ConfigMap
metadata:
  name: idp-config
  namespace: idp
data:
  # Server
  SERVER_URL: "http://localhost:8080"
  ADMIN_TENANT_ID: "67e7eae6-62b0-4500-9eff-87459f63fc66"

  # Database
  DATABASE_TYPE: "POSTGRESQL"
  DB_WRITER_URL: "jdbc:postgresql://postgres:5432/idpserver"
  DB_WRITER_USER_NAME: "idp_app_user"
  DB_WRITER_TIMEOUT: "2000"
  DB_WRITER_MAX_POOL_SIZE: "30"
  DB_WRITER_MIN_IDLE: "5"
  DB_READER_URL: "jdbc:postgresql://postgres:5432/idpserver"
  DB_READER_USER_NAME: "idp_app_user"
  DB_READER_TIMEOUT: "2000"
  DB_READER_MAX_POOL_SIZE: "10"
  DB_READER_MIN_IDLE: "5"

  # Control Plane Database
  CONTROL_PLANE_DB_WRITER_URL: "jdbc:postgresql://postgres:5432/idpserver"
  CONTROL_PLANE_DB_WRITER_USER_NAME: "idp_admin_user"
  CONTROL_PLANE_DB_WRITER_TIMEOUT: "2000"
  CONTROL_PLANE_DB_WRITER_MAX_POOL_SIZE: "10"
  CONTROL_PLANE_DB_WRITER_MIN_IDLE: "5"
  CONTROL_PLANE_DB_READER_URL: "jdbc:postgresql://postgres:5432/idpserver"
  CONTROL_PLANE_DB_READER_USER_NAME: "idp_admin_user"
  CONTROL_PLANE_DB_READER_TIMEOUT: "2000"
  CONTROL_PLANE_DB_READER_MAX_POOL_SIZE: "10"
  CONTROL_PLANE_DB_READER_MIN_IDLE: "5"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # Cache
  CACHE_ENABLE: "true"
  CACHE_TIME_TO_LIVE_SECOND: "300"
  TOKEN_CACHE_ENABLED: "true"
  REDIS_CACHE_DATABASE: "1"
  REDIS_CACHE_PASSWORD: ""
  REDIS_CACHE_TIMEOUT: "10000"

  # Session
  SESSION_REDIS_ENABLE: "true"
  REDIS_SESSION_DATABASE: "0"
  REDIS_SESSION_PASSWORD: ""
  REDIS_SESSION_TIMEOUT: "10000"
  REDIS_SESSION_MAX_TOTAL: "20"
  REDIS_SESSION_MAX_IDLE: "3"
  REDIS_SESSION_MIN_IDLE: "2"
  IDP_AUTH_SESSION_SAME_SITE: "Lax"
  IDP_AUTH_SESSION_SECURE: "false"

  # Server tuning
  IDP_SERVER_SHUTDOWN_DELAY: "5s"
  SERVER_TOMCAT_THREADS_MAX: "300"
  SERVER_TOMCAT_THREADS_MIN_SPARE: "50"

  # Logging
  LOGGING_LEVEL_ROOT: "info"
  LOGGING_LEVEL_WEB: "info"
  LOGGING_LEVEL_IDP_SERVER_AUTHENTICATION_INTERACTORS: "debug"
  LOGGING_LEVEL_IDP_SERVER_PLATFORM: "debug"
  LOGGING_LEVEL_IDP_SERVER_HTTP_REQUEST_EXECUTOR: "debug"
  LOGGING_LEVEL_IDP_SERVER_CORE_OPENID: "debug"
  LOGGING_LEVEL_IDP_SERVER_CORE_ADAPTERS: "debug"
  LOGGING_LEVEL_IDP_SERVER_ADAPTERS_SPRING_BOOT: "debug"
  LOGGING_LEVEL_IDP_SERVER_AUTHENTICATORS_WEBAUTHN4J: "debug"
  LOGGING_LEVEL_REQUEST_RESPONSE_LOGGING_FILTER: "debug"
  IDP_LOGGING_REQUEST_RESPONSE_ENABLED: "false"
  IDP_LOGGING_REQUEST_RESPONSE_MASK_TOKENS: "true"
  IDP_LOGGING_REQUEST_RESPONSE_MAX_BODY_SIZE: "10000"
  IDP_LOGGING_REQUEST_RESPONSE_ENDPOINTS: "/v1/tokens,/v1/authorizations,/v1/backchannel/authentications,/v1/userinfo"

  # Async thread pools
  SECURITY_EVENT_CORE_POOL_SIZE: "5"
  SECURITY_EVENT_MAX_POOL_SIZE: "30"
  SECURITY_EVENT_QUEUE_CAPACITY: "5000"
  SECURITY_EVENT_RETRY_QUEUE_CAPACITY: "5000"
  USER_LIFECYCLE_EVENT_CORE_POOL_SIZE: "5"
  USER_LIFECYCLE_EVENT_MAX_POOL_SIZE: "10"
  USER_LIFECYCLE_EVENT_QUEUE_CAPACITY: "1000"
  AUDIT_LOG_CORE_POOL_SIZE: "5"
  AUDIT_LOG_MAX_POOL_SIZE: "30"
  AUDIT_LOG_QUEUE_CAPACITY: "5000"

  # JVM
  JAVA_TOOL_OPTIONS: "-Xms256m -Xmx1g -XX:MaxGCPauseMillis=100"
