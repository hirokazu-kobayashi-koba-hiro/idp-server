apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-idp-server
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  idp-server-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "HTTP リクエスト数/秒",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"idp\"}[5m])) by (uri, method)",
              "legendFormat": "{{method}} {{uri}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "HTTP 平均レイテンシ",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_sum{namespace=\"idp\"}[5m])) by (uri) / sum(rate(http_server_requests_seconds_count{namespace=\"idp\"}[5m])) by (uri)",
              "legendFormat": "{{uri}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "HTTP エラー率",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "showPoints": "never"
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"idp\", status=~\"4..\"}[5m]))",
              "legendFormat": "4xx",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"idp\", status=~\"5..\"}[5m]))",
              "legendFormat": "5xx",
              "refId": "B"
            }
          ]
        },
        {
          "title": "JVM ヒープメモリ",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{namespace=\"idp\", area=\"heap\"}) by (pod)",
              "legendFormat": "used {{pod}}",
              "refId": "A"
            },
            {
              "expr": "sum(jvm_memory_max_bytes{namespace=\"idp\", area=\"heap\"}) by (pod)",
              "legendFormat": "max {{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "title": "JVM スレッド数",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "jvm_threads_live_threads{namespace=\"idp\"}",
              "legendFormat": "live {{pod}}",
              "refId": "A"
            },
            {
              "expr": "jvm_threads_daemon_threads{namespace=\"idp\"}",
              "legendFormat": "daemon {{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "title": "CPU 使用率",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "process_cpu_usage{namespace=\"idp\"}",
              "legendFormat": "process {{pod}}",
              "refId": "A"
            },
            {
              "expr": "system_cpu_usage{namespace=\"idp\"}",
              "legendFormat": "system {{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "title": "GC 停止時間",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "rate(jvm_gc_pause_seconds_sum{namespace=\"idp\"}[5m])",
              "legendFormat": "{{action}} {{cause}} {{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Executor スレッドプール",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "executor_active_threads{namespace=\"idp\"}",
              "legendFormat": "active {{name}} {{pod}}",
              "refId": "A"
            },
            {
              "expr": "executor_queued_tasks{namespace=\"idp\"}",
              "legendFormat": "queued {{name}} {{pod}}",
              "refId": "B"
            },
            {
              "expr": "executor_pool_size_threads{namespace=\"idp\"}",
              "legendFormat": "pool {{name}} {{pod}}",
              "refId": "C"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["idp-server", "jvm", "spring-boot"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "IDP Server",
      "uid": "idp-server-overview",
      "version": 1
    }
