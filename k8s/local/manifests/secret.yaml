# ローカル開発専用（up.sh フルK8sモードで使用）
# up-app-only.sh では .env から動的に Secret を生成するため、このファイルは使用しない
# 本番環境では External Secrets Operator 等を使用すること
apiVersion: v1
kind: Secret
metadata:
  name: idp-secrets
  namespace: idp
type: Opaque
stringData:
  POSTGRES_PASSWORD: "local-pg-password"
  DB_OWNER_PASSWORD: "local-owner-password"
  IDP_DB_ADMIN_PASSWORD: "local-admin-password"
  IDP_DB_APP_PASSWORD: "local-app-password"
  IDP_SERVER_API_KEY: "change-me-api-key"
  IDP_SERVER_API_SECRET: "change-me-api-secret"
  ENCRYPTION_KEY: "change-me-encryption-key"
