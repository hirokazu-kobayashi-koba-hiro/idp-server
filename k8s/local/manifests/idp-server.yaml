apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-server
  namespace: idp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idp-server
  template:
    metadata:
      labels:
        app: idp-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # up-app-only.sh が host.docker.internal の実IP で動的に設定する
      # ローカルドメイン → Docker ホスト（nginx）へのルーティング用
      hostAliases: []
      containers:
        - name: idp-server
          image: idp-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: root-ca
              mountPath: /app/certs
              readOnly: true
          envFrom:
            - configMapRef:
                name: idp-config
          env:
            - name: IDP_SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: IDP_SERVER_API_KEY
            - name: IDP_SERVER_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: IDP_SERVER_API_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: ENCRYPTION_KEY
            - name: DB_WRITER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: IDP_DB_APP_PASSWORD
            - name: DB_READER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: IDP_DB_APP_PASSWORD
            - name: CONTROL_PLANE_DB_WRITER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: IDP_DB_ADMIN_PASSWORD
            - name: CONTROL_PLANE_DB_READER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idp-secrets
                  key: IDP_DB_ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: root-ca
          secret:
            secretName: root-ca-cert
---
apiVersion: v1
kind: Service
metadata:
  name: idp-server
  namespace: idp
  labels:
    app: idp-server
spec:
  type: NodePort
  selector:
    app: idp-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: idp-server
  namespace: idp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: idp-server
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
