worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 10000;
  client_max_body_size 20m;

  # Rate limiting (same as Docker Compose)
  limit_req_zone $binary_remote_addr zone=token_per_ip:10m rate=2000r/s;
  limit_req_zone $binary_remote_addr zone=authorize_per_ip:10m rate=3000r/s;
  limit_req_zone $binary_remote_addr zone=api_general_per_ip:10m rate=5000r/s;
  limit_req_zone $server_name zone=token_global:1m rate=2000r/s;
  limit_req_zone $server_name zone=authorize_global:1m rate=3000r/s;
  limit_req_zone $server_name zone=api_general_global:1m rate=5000r/s;
  limit_req_status 429;

  # kind の idp-server (NodePort 経由)
  upstream idp_backend {
    server host.docker.internal:8080;
    keepalive 100;
  }

  upstream app_view {
    server app-view-kind:3000;
  }

  upstream sample_web {
    server sample-web-kind:3010;
  }

  upstream app_view_crosssite {
    server app-view-crosssite-kind:3000;
  }

  upstream app_view_context_path {
    server app-view-context-path-kind:3000;
  }

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name *.local.test local.test;
    return 301 https://$host$request_uri;
  }

  # IDP Server API (api.local.test)
  server {
    listen 443 ssl;
    server_name api.local.test;

    ssl_certificate /etc/nginx/certs/_wildcard.local.test+1.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.local.test+1-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Token endpoint
    location ~ ^/[^/]+/v1/tokens$ {
      limit_req zone=token_per_ip burst=4000 nodelay;
      limit_req zone=token_global burst=4000 nodelay;
      proxy_pass http://idp_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # Authorization endpoint
    location ~ ^/[^/]+/v1/authorizations {
      limit_req zone=authorize_per_ip burst=5000 nodelay;
      limit_req zone=authorize_global burst=5000 nodelay;
      proxy_pass http://idp_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # API Gateway simulation: /idp-admin/* -> /*
    location /idp-admin/ {
      limit_req zone=api_general_per_ip burst=8000 nodelay;
      limit_req zone=api_general_global burst=8000 nodelay;
      proxy_pass http://idp_backend/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # General API
    location / {
      limit_req zone=api_general_per_ip burst=8000 nodelay;
      limit_req zone=api_general_global burst=8000 nodelay;
      proxy_pass http://idp_backend/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }
  }

  # mTLS Client Authentication (mtls.api.local.test)
  server {
    listen 443 ssl;
    server_name mtls.api.local.test;

    ssl_certificate /etc/nginx/certs/_wildcard.local.test+1.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.local.test+1-key.pem;

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    ssl_client_certificate /etc/nginx/certs/client-ca-bundle.pem;
    ssl_verify_client optional;
    ssl_verify_depth 1;

    # Token endpoint
    location ~ ^/[^/]+/v1/tokens$ {
      limit_req zone=token_per_ip burst=4000 nodelay;
      limit_req zone=token_global burst=4000 nodelay;
      proxy_pass http://idp_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header x-ssl-cert $ssl_client_escaped_cert;
      proxy_set_header x-ssl-client-s-dn $ssl_client_s_dn;
      proxy_set_header x-ssl-client-i-dn $ssl_client_i_dn;
      proxy_set_header x-ssl-client-verify $ssl_client_verify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # Authorization endpoint
    location ~ ^/[^/]+/v1/authorizations {
      limit_req zone=authorize_per_ip burst=5000 nodelay;
      limit_req zone=authorize_global burst=5000 nodelay;
      proxy_pass http://idp_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header x-ssl-cert $ssl_client_escaped_cert;
      proxy_set_header x-ssl-client-s-dn $ssl_client_s_dn;
      proxy_set_header x-ssl-client-i-dn $ssl_client_i_dn;
      proxy_set_header x-ssl-client-verify $ssl_client_verify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # General API
    location / {
      limit_req zone=api_general_per_ip burst=8000 nodelay;
      limit_req zone=api_general_global burst=8000 nodelay;
      proxy_pass http://idp_backend/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header x-ssl-cert $ssl_client_escaped_cert;
      proxy_set_header x-ssl-client-s-dn $ssl_client_s_dn;
      proxy_set_header x-ssl-client-i-dn $ssl_client_i_dn;
      proxy_set_header x-ssl-client-verify $ssl_client_verify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }
  }

  # App View - Authorization UI (auth.local.test)
  server {
    listen 443 ssl;
    server_name auth.local.test;

    ssl_certificate /etc/nginx/certs/_wildcard.local.test+1.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.local.test+1-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://app_view/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location /_next/webpack-hmr {
      proxy_pass http://app_view/_next/webpack-hmr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Cross-site Auth UI (auth.idp.local)
  server {
    listen 443 ssl;
    server_name auth.idp.local;

    ssl_certificate /etc/nginx/certs/_wildcard.idp.local+1.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.idp.local+1-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://app_view_crosssite/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location /_next/webpack-hmr {
      proxy_pass http://app_view_crosssite/_next/webpack-hmr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Cross-site Auth UI with context path (auth-cp.idp.local)
  server {
    listen 443 ssl;
    server_name auth-cp.idp.local;

    ssl_certificate /etc/nginx/certs/_wildcard.idp.local+1.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.idp.local+1-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://app_view_context_path/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location /_next/webpack-hmr {
      proxy_pass http://app_view_context_path/_next/webpack-hmr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Sample Web Application (sample.local.test)
  server {
    listen 443 ssl;
    server_name sample.local.test;

    ssl_certificate /etc/nginx/certs/_wildcard.local.test+1.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.local.test+1-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location / {
      proxy_pass http://sample_web/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location /_next/webpack-hmr {
      proxy_pass http://sample_web/_next/webpack-hmr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
