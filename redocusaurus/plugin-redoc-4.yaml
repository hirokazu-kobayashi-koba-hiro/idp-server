openapi: 3.0.3
info:
  title: idp-server コントロールプレーン テナント管理 API
  description: テナントおよび認可サーバーの管理API仕様書
  version: 1.0.0
  contact:
    name: idp-server OSS
servers:
  - url: http://localhost:8080
tags:
  - name: organization-tenant
    description: 組織レベルテナント管理
  - name: organization-authorization-server
    description: 組織レベル認可サーバー管理
paths:
  /v1/management/organizations/{organization-id}/tenants:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      summary: Create tenant within organization
      description: |
        特定の組織に新しいテナントを作成します。

        作成されるテナントは常に `type=PUBLIC`（エンドユーザー向けの実運用テナント）として作成されます。
        `ADMIN` / `ORGANIZER` タイプはこのAPIでは作成できません:
        - `ADMIN` はサーバー起動時に1つだけ自動作成されます
        - `ORGANIZER` は組織オンボーディング時に自動作成されます
      tags:
        - organization-tenant
      parameters:
        - $ref: '#/components/parameters/DryRun'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '201':
          description: テナントの作成が成功しました
          content:
            application/json:
              schema:
                type: object
                properties:
                  dry_run:
                    type: boolean
                    description: ドライランかどうか
                  result:
                    $ref: '#/components/schemas/Tenant'
        '400':
          description: 無効なリクエストデータまたはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足または無効な組織アクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織が見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List tenants within organization
      description: 特定の組織のテナント一覧を取得します
      tags:
        - organization-tenant
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: テナント一覧の取得が成功しました
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
        '403':
          description: 権限不足または無効な組織アクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織が見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/management/organizations/{organization-id}/tenants/{tenant-id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/TenantId'
    get:
      summary: Get tenant within organization
      description: 組織の特定のテナントを取得します
      tags:
        - organization-tenant
      responses:
        '200':
          description: テナントの取得が成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '403':
          description: 権限不足または無効な組織・テナントアクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織またはテナントが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update tenant within organization
      description: 組織の特定のテナントを更新します
      tags:
        - organization-tenant
      parameters:
        - $ref: '#/components/parameters/DryRun'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: テナントの更新が成功しました
          content:
            application/json:
              schema:
                type: object
                properties:
                  dry_run:
                    type: boolean
                    description: ドライランかどうか
                  result:
                    $ref: '#/components/schemas/Tenant'
        '400':
          description: 無効なリクエストデータまたはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足または無効な組織・テナントアクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織またはテナントが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete tenant within organization
      description: 組織の特定のテナントを削除します
      tags:
        - organization-tenant
      parameters:
        - $ref: '#/components/parameters/DryRun'
      responses:
        '204':
          description: テナントの削除が成功しました
        '403':
          description: 権限不足または無効な組織・テナントアクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織またはテナントが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/management/organizations/{organization-id}/tenants/{tenant-id}/authorization-server:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/TenantId'
    get:
      summary: Get authorization server configuration for organization tenant
      description: 組織内の特定のテナントの認証サーバー設定を取得します
      tags:
        - organization-authorization-server
      responses:
        '200':
          description: 認証サーバー設定を正常に取得しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDConfiguration'
        '403':
          description: 権限不足または無効な組織アクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織またはテナントが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update authorization server configuration for organization tenant
      description: 組織内の特定のテナントの認証サーバー設定を更新します
      tags:
        - organization-authorization-server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenIDConfiguration'
      parameters:
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: 認証サーバー設定を正常に更新しました
          content:
            application/json:
              schema:
                type: object
                properties:
                  dry_run:
                    type: boolean
                    description: これがドライラン操作であったかを示します
                  result:
                    $ref: '#/components/schemas/OpenIDConfiguration'
        '400':
          description: 無効なリクエストボディまたは検証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 権限不足または無効な組織アクセス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 組織またはテナントが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    TenantId:
      name: tenant-id
      in: path
      required: true
      schema:
        type: string
      description: テナントの識別子
    OrganizationId:
      name: organization-id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 組織の識別子
    DryRun:
      name: dry_run
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: trueの場合、リクエストの検証のみで実行はされません
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20
      description: 返すアイテムの最大数
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: アイテムを返す開始インデックス
  schemas:
    OpenIDConfiguration:
      type: object
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
        - scopes_supported
        - response_types_supported
        - response_modes_supported
        - subject_types_supported
      properties:
        issuer:
          type: string
          format: uri
          description: >-
            必須。OPが発行者識別子として主張するhttpsスキームを使用し、クエリやフラグメントコンポーネントを含まないURL。発行者発見がサポートされている場合（セクション2参照）、この値はWebFingerによって返される発行者値と同一でなければならない。また、この発行者から発行されるIDトークンのissクレーム値と同一でなければならない。
        authorization_endpoint:
          type: string
          format: uri
          description: >-
            必須。OPのOAuth
            2.0認可エンドポイント[OpenID.Core]のURL。このURLはhttpsスキームを使用しなければならず、ポート、パス、クエリパラメータコンポーネントを含んでもよい。
        token_endpoint:
          type: string
          format: uri
          description: >-
            OPのOAuth
            2.0トークンエンドポイント[OpenID.Core]のURL。Implicitフローのみが使用される場合を除き、これは必須である。このURLはhttpsスキームを使用しなければならず、ポート、パス、クエリパラメータコンポーネントを含んでもよい。
        userinfo_endpoint:
          type: string
          format: uri
          description: >-
            推奨。OPのUserInfoエンドポイント[OpenID.Core]のURL。このURLはhttpsスキームを使用しなければならず、ポート、パス、クエリパラメータコンポーネントを含んでもよい。
        jwk:
          type: string
          format: jwks
          description: JWKセット
        jwks_uri:
          type: string
          format: uri
          description: >-
            必須。OPのJWKセット[JWK]ドキュメントのURL。httpsスキームを使用しなければならない。これにはRPがOPからの署名を検証するために使用する署名鍵が含まれる。JWKセットには、RPがサーバーへのリクエストを暗号化するために使用するサーバーの暗号化鍵も含まれる場合がある。署名鍵と暗号化鍵の両方が利用可能な場合、参照されるJWKセット内のすべての鍵に対して、各鍵の意図された用途を示すuse（公開鍵用途）パラメータ値が必須である。一部のアルゴリズムでは同じ鍵を署名と暗号化の両方に使用できるが、セキュリティが低下するため推奨されない。JWK
            x5cパラメータは、提供される鍵のX.509表現を提供するために使用される場合がある。使用される場合、素の鍵値も存在しなければならず、証明書内の値と一致しなければならない。JWKセットには秘密鍵や対称鍵値を含んではならない。
        registration_endpoint:
          type: string
          format: uri
          description: >-
            推奨。OPの動的クライアント登録エンドポイント[OpenID.Registration]のURL。httpsスキームを使用しなければならない。
        scopes_supported:
          type: array
          items:
            type: string
          description: >-
            推奨。このサーバーがサポートするOAuth 2.0
            [RFC6749]スコープ値のリストを含むJSON配列。サーバーはopenidスコープ値をサポートしなければならない。このパラメータが使用される場合でも、サーバーはサポートされているスコープ値の一部を広告しないことを選択してもよいが、[OpenID.Core]で定義されているものは、サポートされている場合はリストされるべきである。
        response_types_supported:
          type: array
          items:
            type: string
            enum:
              - code
              - token
              - id_token
              - code token
              - code token id_token
              - token id_token
              - code id_token
              - none
          description: >-
            必須。このOPがサポートするOAuth 2.0
            response_type値のリストを含むJSON配列。動的OpenIDプロバイダーは、code、id_token、およびid_token
            tokenレスポンスタイプ値をサポートしなければならない。
        response_modes_supported:
          type: array
          items:
            type: string
            enum:
              - query
              - fragment
          default:
            - query
            - fragment
          description: >-
            オプション。OAuth 2.0 Multiple Response Type Encoding Practices
            [OAuth.Responses]で指定されているように、このOPがサポートするOAuth 2.0
            response_mode値のリストを含むJSON配列。省略された場合、動的OpenIDプロバイダーのデフォルトは["query",
            "fragment"]である。
        grant_types_supported:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - implicit
              - refresh_token
              - password
              - client_credentials
              - urn:openid:params:grant-type:ciba
          default:
            - authorization_code
            - implicit
          description: >-
            オプション。このOPがサポートするOAuth
            2.0グラントタイプ値のリストを含むJSON配列。動的OpenIDプロバイダーはauthorization_codeおよびimplicitグラントタイプ値をサポートしなければならず、他のグラントタイプをサポートしてもよい。省略された場合、デフォルト値は["authorization_code",
            "implicit"]である。
        acr_values_supported:
          type: array
          items:
            type: string
          description: オプション。このOPがサポートする認証コンテキストクラス参照のリストを含むJSON配列。
        subject_types_supported:
          type: array
          items:
            type: string
            enum:
              - pairwise
              - public
          description: >-
            必須。このOPがサポートするサブジェクト識別子タイプのリストを含むJSON配列。有効なタイプにはpairwiseおよびpublicが含まれる。
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: >-
            必須。OPがIDTokenでクレームをJWT
            [JWT]でエンコードするためにサポートするJWS署名アルゴリズム（alg値）のリストを含むJSON配列。アルゴリズムRS256を含めなければならない。値noneはサポートされてもよいが、使用されるレスポンスタイプが認証エンドポイントからIDTokenを返さない場合（認証コードフロー使用時など）を除き使用してはならない。
        id_token_encryption_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - RSA1_5
              - A128KW
          description: >-
            オプション。OPがIDTokenでクレームをJWT
            [JWT]でエンコードするためにサポートするJWE暗号化アルゴリズム（alg値）のリストを含むJSON配列。
        id_token_encryption_enc_values_supported:
          type: array
          items:
            type: string
            enum:
              - A128CBC-HS256
              - A128GCM
              - A256GCM
          description: >-
            オプション。OPがIDTokenでクレームをJWT
            [JWT]でエンコードするためにサポートするJWE暗号化アルゴリズム（enc値）のリストを含むJSON配列。
        userinfo_signing_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: >-
            オプション。UserInfoエンドポイントがクレームをJWT [JWT]でエンコードするためにサポートするJWS
            [JWS]署名アルゴリズム（alg値）[JWA]のリストを含むJSON配列。値noneが含まれてもよい。
        userinfo_encryption_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - RSA1_5
              - A128KW
          description: >-
            オプション。UserInfoエンドポイントがクレームをJWT [JWT]でエンコードするためにサポートするJWE
            [JWE]暗号化アルゴリズム（alg値）[JWA]のリストを含むJSON配列。
        userinfo_encryption_enc_values_supported:
          type: array
          items:
            type: string
            enum:
              - A128CBC-HS256
              - A128GCM
              - A256GCM
          description: >-
            オプション。UserInfoエンドポイントがクレームをJWT
            [JWT]でエンコードするためにサポートするJWE暗号化アルゴリズム（enc値）[JWA]のリストを含むJSON配列。
        request_object_signing_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: >-
            オプション。OpenID Connect Core 1.0
            [OpenID.Core]のセクション6.1で説明されているリクエストオブジェクトに対してOPがサポートするJWS署名アルゴリズム（alg値）のリストを含むJSON配列。これらのアルゴリズムは、リクエストオブジェクトが値で渡される場合（requestパラメータ使用）と参照で渡される場合（request_uriパラメータ使用）の両方で使用される。サーバーはnoneとRS256をサポートすべきである。
        request_object_encryption_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - RSA1_5
              - A128KW
          description: >-
            オプション。リクエストオブジェクトに対してOPがサポートするJWE暗号化アルゴリズム（alg値）のリストを含むJSON配列。これらのアルゴリズムは、リクエストオブジェクトが値で渡される場合と参照で渡される場合の両方で使用される。
        request_object_encryption_enc_values_supported:
          type: array
          items:
            type: string
            enum:
              - A128CBC-HS256
              - A128GCM
              - A256GCM
          description: >-
            オプション。リクエストオブジェクトに対してOPがサポートするJWE暗号化アルゴリズム（enc値）のリストを含むJSON配列。これらのアルゴリズムは、リクエストオブジェクトが値で渡される場合と参照で渡される場合の両方で使用される。
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
            enum:
              - client_secret_post
              - client_secret_basic
              - client_secret_jwt
              - private_key_jwt
              - tls_client_auth
              - self_signed_tls_client_auth
              - none
          description: >-
            オプション。このトークンエンドポイントがサポートするクライアント認証方法のリストを含むJSON配列。オプションはclient_secret_post、client_secret_basic、client_secret_jwt、およびprivate_key_jwtで、OpenID
            Connect Core
            1.0のセクション9で説明されている。他の認証方法は拡張によって定義される場合がある。省略された場合、デフォルトはclient_secret_basic（OAuth
            2.0 [RFC6749]のセクション2.3.1で指定されているHTTP基本認証スキーム）である。
        token_endpoint_auth_signing_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: >-
            オプション。private_key_jwtおよびclient_secret_jwt認証方法において、トークンエンドポイントでクライアントを認証するために使用されるJWT
            [JWT]の署名に対してトークンエンドポイントがサポートするJWS署名アルゴリズム（alg値）のリストを含むJSON配列。サーバーはRS256をサポートすべきである。値noneは使用してはならない。
        display_values_supported:
          type: array
          items:
            type: string
            enum:
              - page
              - popup
          description: >-
            オプション。OpenIDプロバイダーがサポートするdisplayパラメータ値のリストを含むJSON配列。これらの値はOpenID
            Connect Core 1.0 [OpenID.Core]のセクション3.1.2.1で説明されている。
        claim_types_supported:
          type: array
          items:
            type: string
            enum:
              - normal
          description: >-
            オプション。OpenIDプロバイダーがサポートするクレームタイプのリストを含むJSON配列。これらのクレームタイプはOpenID
            Connect Core 1.0
            [OpenID.Core]のセクション5.6で説明されている。この仕様で定義されている値はnormal、aggregated、distributedである。省略された場合、実装はnormalクレームのみをサポートする。
        claims_supported:
          type: array
          items:
            type: string
          default:
            - sub
            - iss
            - auth_time
            - acr
            - name
            - given_name
            - family_name
            - nickname
            - profile
            - picture
            - website
            - email
            - email_verified
            - locale
            - zoneinfo
            - birthdate
            - gender
            - preferred_username
            - middle_name
            - updated_at
            - address
            - phone_number
            - phone_number_verified
          description: >-
            推奨。OpenIDプロバイダーが値を提供できる可能性のあるクレームのクレーム名のリストを含むJSON配列。プライバシーやその他の理由により、これは完全なリストではない可能性があることに注意。
        service_documentation:
          type: string
          format: uri
          description: >-
            オプション。OpenIDプロバイダーを使用する際に開発者が知りたいまたは知る必要がある可能性のある人間が読める情報を含むページのURL。特に、OpenIDプロバイダーが動的クライアント登録をサポートしない場合、クライアントの登録方法に関する情報をこのドキュメントに提供する必要がある。
        claims_locales_supported:
          type: array
          items:
            type: string
          description: >-
            オプション。返されるクレームの値にサポートされている言語とスクリプト。BCP47
            [RFC5646]言語タグ値のJSON配列で表現される。すべてのクレーム値に対してすべての言語とスクリプトが必ずしもサポートされるわけではない。
        ui_locales_supported:
          type: array
          items:
            type: string
          description: >-
            オプション。ユーザーインターフェースにサポートされている言語とスクリプト。BCP47
            [RFC5646]言語タグ値のJSON配列で表現される。
        claims_parameter_supported:
          type: boolean
          default: true
          description: >-
            オプション。OPがclaimsパラメータの使用をサポートするかどうかを指定するブール値。trueはサポートを示す。省略された場合、デフォルト値はfalseである。
        request_parameter_supported:
          type: boolean
          default: false
          description: >-
            オプション。OPがrequestパラメータの使用をサポートするかどうかを指定するブール値。trueはサポートを示す。省略された場合、デフォルト値はfalseである。
        request_uri_parameter_supported:
          type: boolean
          default: false
          description: >-
            オプション。OPがrequest_uriパラメータの使用をサポートするかどうかを指定するブール値。trueはサポートを示す。省略された場合、デフォルト値はtrueである。
        require_request_uri_registration:
          type: boolean
          default: false
          description: >-
            オプション。OPが使用されるrequest_uri値をrequest_uris登録パラメータを使用して事前登録することを要求するかどうかを指定するブール値。値がtrueの場合、事前登録が必須である。省略された場合、デフォルト値はfalseである。
        op_policy_uri:
          type: string
          format: uri
          description: >-
            オプション。OpenIDプロバイダーがクライアントを登録する人に対して、Relying
            PartyがOPから提供されたデータをどのように使用できるかにOPの要件を読むために提供するURL。提供された場合、登録プロセスはクライアントを登録する人にこのURLを表示すべきである。
        op_tos_uri:
          type: string
          format: uri
          description: >-
            オプション。OpenIDプロバイダーがクライアントを登録する人に対して、OpenIDプロバイダーのサービス規約を読むために提供するURL。提供された場合、登録プロセスはクライアントを登録する人にこのURLを表示すべきである。
        revocation_endpoint:
          type: string
          format: uri
          description: オプション。リボケーションエンドポイントのURL。
        revocation_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
            enum:
              - client_secret_post
              - client_secret_basic
              - client_secret_jwt
              - private_key_jwt
              - tls_client_auth
              - self_signed_tls_client_auth
          description: オプション。リボケーションエンドポイントでサポートされる認証方法。
        revocation_endpoint_auth_signing_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: オプション。リボケーションエンドポイントでサポートされる署名アルゴリズム。
        introspection_endpoint:
          type: string
          format: uri
          description: オプション。イントロスペクションエンドポイントのURL。
        introspection_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: オプション。イントロスペクションエンドポイントでサポートされる認証方法。
        introspection_endpoint_auth_signing_alg_values_supported:
          type: array
          items:
            type: string
            enum:
              - none
              - RS256
              - ES256
              - HS256
          description: オプション。イントロスペクションエンドポイントでサポートされる署名アルゴリズム。
        code_challenge_methods_supported:
          type: array
          items:
            type: string
            enum:
              - plain
              - S256
          description: オプション。サポートされるPKCEコードチャレンジ方法。
        extension:
          type: object
          description: 認証サーバー動作のための拡張設定パラメータ。
          properties:
            access_token_type:
              type: string
              enum:
                - opaque
                - jwt
              default: opaque
              description: >-
                Specifies the format of issued access tokens. Either 'opaque' or
                'jwt'.
            authorization_code_valid_duration:
              type: integer
              default: 600
              description: 認証コードの有効期間（秒）。
            token_signed_key_id:
              type: string
              description: アクセストークンの署名に使用するキーID。
            id_token_signed_key_id:
              type: string
              description: IDトークンの署名に使用するキーID。
            access_token_duration:
              type: integer
              default: 1800
              description: アクセストークンの有効期間（秒）。
            refresh_token_duration:
              type: integer
              default: 3600
              description: リフレッシュトークンの有効期間（秒）。
            refresh_token_strategy:
              type: string
              default: FIXED
              description: リフレッシュトークン発行戦略。
            rotate_refresh_token:
              type: boolean
              default: true
              description: リフレッシュトークンをローテートするかどうか。
            id_token_duration:
              type: integer
              default: 3600
              description: IDトークンの有効期間（秒）。
            id_token_strict_mode:
              type: boolean
              default: false
              description: IDトークンクレームの厳格な検証を強制する。
            default_max_age:
              type: integer
              default: 86400
              description: デフォルトの最大認証年齢（秒）。
            authorization_response_duration:
              type: integer
              default: 60
              description: 認証レスポンスのライフタイム（秒）。
            backchannel_authentication_request_expires_in:
              type: integer
              default: 300
              description: CIBAバックチャネル認証リクエストの有効期限。
            backchannel_authentication_polling_interval:
              type: integer
              default: 5
              description: CIBAバックチャネル認証のポーリング間隔。
            required_backchannel_auth_user_code:
              type: boolean
              default: false
              description: バックチャネル認証ユーザーコードが必要かどうか。
            backchannel_auth_user_code_type:
              type: string
              default: password
              description: バックチャネル認証ユーザーコードのタイプ。
            default_ciba_authentication_interaction_type:
              type: string
              default: authentication-device-notification
              description: デフォルトのCIBA認証インタラクションタイプ。
            oauth_authorization_request_expires_in:
              type: integer
              default: 1800
              description: OAuth認証リクエストの有効期限。
            fapi_baseline_scopes:
              type: array
              items:
                type: string
              description: FAPI Baseline適合を示すスコープのリスト。
            fapi_advance_scopes:
              type: array
              items:
                type: string
              description: FAPI Advanced適合を示すスコープのリスト。
            required_identity_verification_scopes:
              type: array
              items:
                type: string
              description: 身元確認が必要なスコープのリスト。
            custom_claims_scope_mapping:
              type: boolean
              description: スコープに基づくカスタムクレームのマッピングを有効にする。
            access_token_selective_user_custom_properties:
              type: boolean
              description: アクセストークンでのユーザーカスタムプロパティの選択的包含を有効にする。
            access_token_verified_claims:
              type: boolean
              description: アクセストークンでの検証済みクレームの包含を有効にする。
            access_token_selective_verified_claims:
              type: boolean
              description: アクセストークンでの検証済みクレームの選択的包含を有効にする。
    ErrorResponse:
