<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-size: 14px; fill: #57606a; }
      .boxTitle { font-size: 13px; font-weight: 700; fill: #1f2328; }
      .boxText { font-size: 11px; fill: #1f2328; }
      .key { font-size: 10px; font-family: 'SF Mono', Menlo, Consolas, monospace; fill: #57606a; }
      .flowLabel { font-size: 12px; font-weight: 700; fill: #ffffff; }
      .flowSub { font-size: 10px; fill: #ffffff; opacity: 0.95; }
    </style>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2328"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1320" height="470" fill="#f6f8fa"/>

  <!-- Title -->
  <text x="660" y="38" class="title" text-anchor="middle">鍵ペア登録は FIDO-UAF anchor 経由のみ — 偽アプリは到達できない</text>
  <text x="660" y="58" class="subtitle" text-anchor="middle">FIDO-UAF Gate が偽アプリ・改造アプリを排除 → 正規アプリだけが公開鍵を登録できる</text>

  <!-- =========== 鍵登録は FIDO-UAF anchor 経由のみ =========== -->
  <g id="protection">
    <!-- ROW 1: Bootstrap -->

    <!-- 偽アプリ (left) -->
    <rect x="60" y="100" width="260" height="160" rx="10" fill="#fef0f4" stroke="#cf222e" stroke-width="2"/>
    <text x="190" y="122" class="boxTitle" text-anchor="middle">❌ 偽アプリ / 改造アプリ</text>
    <text x="80" y="144" class="boxText">FIDO-UAF SDK チェックで停止:</text>
    <text x="80" y="162" class="key" fill="#cf222e">• rpId / AppID 不一致</text>
    <text x="80" y="178" class="key" fill="#cf222e">• Root / Jailbreak 検知</text>
    <text x="80" y="194" class="key" fill="#cf222e">• attestation 失敗</text>
    <text x="80" y="210" class="key" fill="#cf222e">• 改造バイナリ検知</text>
    <text x="190" y="240" class="boxTitle" text-anchor="middle" fill="#cf222e">→ 鍵生成・登録に到達不可</text>

    <!-- FIDO-UAF Gate (center) -->
    <rect x="340" y="100" width="280" height="160" rx="10" fill="#fffbe6" stroke="#bf8700" stroke-width="2"/>
    <text x="480" y="122" class="boxTitle" text-anchor="middle">🚪 FIDO-UAF Gate</text>
    <text x="350" y="144" class="boxText">通過条件:</text>
    <text x="350" y="162" class="boxText">✓ 正規 authenticator (attestation)</text>
    <text x="350" y="178" class="boxText">✓ 正規アプリ (rpId/AppID)</text>
    <text x="350" y="194" class="boxText">✓ 健全な端末 (SDK チェック)</text>
    <text x="350" y="210" class="boxText">✓ user verification (生体/PIN)</text>
    <text x="480" y="240" class="boxTitle" text-anchor="middle" fill="#1a7f37">→ ここを通った後のみ次へ</text>

    <!-- 正規アプリ (right) -->
    <rect x="640" y="100" width="260" height="160" rx="10" fill="#dafbe1" stroke="#1a7f37" stroke-width="2"/>
    <text x="770" y="122" class="boxTitle" text-anchor="middle">✅ 正規アプリ (HW)</text>
    <text x="660" y="144" class="boxText">FIDO-UAF Gate 通過後:</text>
    <text x="660" y="162" class="boxText">① HW で 鍵ペア (ES256) 生成</text>
    <text x="660" y="178" class="boxText">② 公開鍵 (JWK) を送信</text>
    <text x="660" y="194" class="boxText">③ FIDO-UAF assertion 同梱</text>
    <text x="660" y="210" class="boxText">④ 秘密鍵は HW に留まる</text>
    <text x="770" y="240" class="boxTitle" text-anchor="middle" fill="#1a7f37">→ 公開鍵だけがサーバへ</text>

    <!-- idp-server side: binding -->
    <rect x="920" y="100" width="320" height="160" rx="10" fill="#f1eafb" stroke="#8250df" stroke-width="2"/>
    <text x="1080" y="122" class="boxTitle" text-anchor="middle">🛡️ idp-server: 公開鍵を bind</text>
    <rect x="940" y="136" width="280" height="100" rx="6" fill="#ffffff" stroke="#8250df"/>
    <text x="950" y="154" class="boxText">公開鍵 (JWK) を保存:</text>
    <text x="950" y="172" class="key">- credential_type = jwt_bearer_asymmetric</text>
    <text x="950" y="188" class="key">- linked_authenticator_id (UAF anchor)</text>
    <text x="950" y="204" class="key">- 認証器失効 → key も失効 (cascade)</text>
    <text x="950" y="228" class="key" fill="#8250df" font-weight="bold">→ 「この authenticator 配下の鍵」と確定</text>

    <!-- Arrows between cells -->
    <path d="M 320,180 L 340,180" stroke="#cf222e" stroke-width="2.5" fill="none" marker-end="url(#arrM)"/>
    <text x="330" y="171" class="key" text-anchor="middle" fill="#cf222e">❌</text>
    <path d="M 620,180 L 640,180" stroke="#1a7f37" stroke-width="2.5" fill="none" marker-end="url(#arrM)"/>
    <path d="M 900,180 L 920,180" stroke="#8250df" stroke-width="2.5" fill="none" marker-end="url(#arrM)"/>

    <!-- ROW 2: Subsequent token issuance using the bound keys -->
    <rect x="60" y="290" width="1180" height="160" rx="10" fill="#f6f8fa" stroke="#0969da" stroke-width="2"/>
    <text x="650" y="312" class="boxTitle" text-anchor="middle">🔄 登録後のトークン発行 — 公開鍵 / 秘密鍵の役割分担</text>

    <!-- Mobile signs -->
    <rect x="80" y="328" width="240" height="106" rx="8" fill="#ddf4ff" stroke="#0969da"/>
    <text x="200" y="350" class="boxTitle" text-anchor="middle">📱 Mobile</text>
    <text x="200" y="372" class="boxText" text-anchor="middle">🔑 秘密鍵 (HW)</text>
    <text x="200" y="392" class="boxText" text-anchor="middle">JWT を署名</text>
    <text x="200" y="410" class="key" text-anchor="middle">HW 内で完結、外に出ない</text>
    <text x="200" y="426" class="key" text-anchor="middle" fill="#0969da">+ DPoP proof (Nonce 同梱)</text>

    <!-- Arrow + transit -->
    <path d="M 322,386 L 580,386" stroke="#1f2328" stroke-width="3" fill="none" marker-end="url(#arrM)"/>
    <rect x="340" y="340" width="220" height="68" rx="6" fill="#fff8c5" stroke="#bf8700"/>
    <text x="450" y="358" class="boxText" text-anchor="middle">経路に流れるもの</text>
    <text x="450" y="376" class="boxText" text-anchor="middle">✓ 署名済み JWT (公開情報)</text>
    <text x="450" y="394" class="key" text-anchor="middle" fill="#bf8700">秘密鍵は流れない</text>

    <!-- Server verifies -->
    <rect x="600" y="328" width="240" height="106" rx="8" fill="#f1eafb" stroke="#8250df"/>
    <text x="720" y="350" class="boxTitle" text-anchor="middle">🛡️ idp-server</text>
    <text x="720" y="372" class="boxText" text-anchor="middle">🔓 公開鍵 (DB)</text>
    <text x="720" y="392" class="boxText" text-anchor="middle">JWT 署名を検証</text>
    <text x="720" y="410" class="key" text-anchor="middle">authenticator linkage も確認</text>
    <text x="720" y="426" class="key" text-anchor="middle" fill="#8250df">+ DPoP nonce 検証</text>

    <!-- Arrow to AT issuance -->
    <path d="M 842,386 L 980,386" stroke="#1f2328" stroke-width="3" fill="none" marker-end="url(#arrM)"/>

    <!-- AT issuance -->
    <rect x="1000" y="328" width="220" height="106" rx="8" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="1110" y="350" class="boxTitle" text-anchor="middle">✅ AT 発行 (DPoP bound)</text>
    <text x="1110" y="372" class="boxText" text-anchor="middle">cnf.jkt = DPoP 公開鍵</text>
    <text x="1110" y="392" class="boxText" text-anchor="middle">→ 盗難単体で使えない</text>
    <text x="1110" y="410" class="key" text-anchor="middle">+ next Nonce piggyback</text>
    <text x="1110" y="426" class="key" text-anchor="middle" fill="#1a7f37">(リプレイ防御)</text>
  </g>
</svg>
